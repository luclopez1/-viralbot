name: ViralBot Mythology Long ES - Unveiled Channel

on:
  schedule:
    - cron: '0 22 * * *'   # 23:00 Spain (22:00 UTC) - noche
  workflow_dispatch:

env:
  GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
  GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
  HF_API_TOKEN: ${{ secrets.HF_API_TOKEN }}

jobs:
  generate-mythology-long:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install FFmpeg and fonts
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg libass-dev fonts-liberation fonts-dejavu-core
          sudo fc-cache -fv

      - name: Install Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install packages
        run: pip install -r requirements.txt

      - name: Create CINEMATIC channel credentials
        env:
          YOUTUBE_TOKEN_CINEMATIC: ${{ secrets.YOUTUBE_TOKEN_CINEMATIC }}
          YOUTUBE_CREDENTIALS_CINEMATIC: ${{ secrets.YOUTUBE_CREDENTIALS_CINEMATIC }}
        run: |
          python3 -c "
          import os, json
          raw = os.environ['YOUTUBE_TOKEN_CINEMATIC'].strip().strip(\"'\\\"\")
          json.loads(raw)
          open('youtube_token_cinematic.json', 'w').write(raw)
          raw2 = os.environ['YOUTUBE_CREDENTIALS_CINEMATIC'].strip().strip(\"'\\\"\")
          json.loads(raw2)
          open('youtube_credentials_cinematic.json', 'w').write(raw2)
          print('[OK] Cinematic credentials created')
          "
          mkdir -p temp videos_output logs

      - name: Create .env
        run: |
          echo "GEMINI_API_KEY=${GEMINI_API_KEY}" > .env
          echo "GROQ_API_KEY=${GROQ_API_KEY}" >> .env
          echo "HF_API_TOKEN=${HF_API_TOKEN}" >> .env
          echo "OUTPUT_DIR=videos_output" >> .env
          echo "TEMP_DIR=temp" >> .env

      - name: Generate Mythology Long Video for Unveiled
        run: python generate_mythology_long.py
