name: ViralBot Long - Generar Video Largo Diario

on:
  # Schedule desactivado - solo manual
  workflow_dispatch:

env:
  GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
  YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
  PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
  GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}

jobs:
  generate-long-video:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Instalar FFmpeg
        run: sudo apt-get install -y ffmpeg

      - name: Instalar Python y dependencias
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar paquetes
        run: pip install -r requirements.txt

      - name: Crear archivos de credenciales
        env:
          YOUTUBE_TOKEN: ${{ secrets.YOUTUBE_TOKEN }}
          YOUTUBE_CREDENTIALS: ${{ secrets.YOUTUBE_CREDENTIALS }}
        run: python3 create_creds.py && mkdir -p temp videos_output logs

      - name: Verificar archivos de credenciales
        run: python3 -c "import json; json.load(open('youtube_token.json')); json.load(open('youtube_credentials.json')); print('[OK] Credenciales validas')"

      - name: Crear .env
        run: |
          echo "GEMINI_API_KEY=${GEMINI_API_KEY}" > .env
          echo "YOUTUBE_API_KEY=${YOUTUBE_API_KEY}" >> .env
          echo "PEXELS_API_KEY=${PEXELS_API_KEY}" >> .env
          echo "GROQ_API_KEY=${GROQ_API_KEY}" >> .env
          echo "OUTPUT_DIR=./videos_output" >> .env
          echo "TEMP_DIR=./temp" >> .env

      - name: Generar y subir video largo
        run: python generate_long_video.py
